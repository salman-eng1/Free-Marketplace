apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-kibana
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: market-kibana
  template:
    metadata:
      labels:
        app: market-kibana
    spec:
      containers:
        - name: market-kibana
          image: docker.elastic.co/kibana/kibana:8.13.0
          resources:
            limits:
              memory: "1Gi"
              cpu: "1500m"
            requests:
              cpu: 250m
              memory: 1Gi
          env:
            - name: ELASTICSEARCH_HOSTS
              # http://<service-name>.<namespace>.svc.cluster.local:<port-number>
              value: http://market-elastic.production.svc.cluster.local:9200
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: market-backend-secret
                  key: market-elasticsearch-password
          ports:
          - name: market-kibana
            containerPort: 5601